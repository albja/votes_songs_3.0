<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vote pour le prochain morceau</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            .container {
                width: 100%;
                max-width: 500px;
                background: white;
                border-radius: 20px;
                padding: 30px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                text-align: center;
            }

            h2 {
                color: #333;
                margin-bottom: 10px;
                font-size: 28px;
            }

            .subtitle {
                color: #666;
                margin-bottom: 30px;
                font-size: 14px;
            }

            #songs {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            button {
                padding: 18px;
                font-size: 16px;
                font-weight: 600;
                border: 2px solid #667eea;
                background: white;
                color: #667eea;
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
                text-align: left;
                padding-left: 20px;
            }

            button:hover:not(:disabled) {
                background: #667eea;
                color: white;
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            }

            button:active:not(:disabled) {
                transform: translateY(0);
            }

            button:disabled {
                background: #10b981;
                color: white;
                border-color: #10b981;
                cursor: not-allowed;
                opacity: 0.8;
            }

            .loading {
                color: #667eea;
                font-size: 16px;
                padding: 20px;
            }

            .error {
                color: #ef4444;
                background: #fee2e2;
                padding: 15px;
                border-radius: 8px;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>🎵 Vote</h2>
            <p class="subtitle">Quel morceau veux-tu entendre ?</p>
            <div id="songs" class="loading">Chargement des morceaux...</div>
            <p id="vote-info" class="subtitle" style="margin-top: 16px"></p>
        </div>
        <script type="module">
            import { supabase } from "./supabase.js";

            let hasVoted = false;
            let currentRound = 1;
            let allButtons = [];

            async function loadRound() {
                try {
                    const { data } = await supabase
                        .from("app_state")
                        .select("round")
                        .eq("id", 1)
                        .single();
                    if (data && typeof data.round === "number")
                        currentRound = data.round;
                } catch (err) {
                    console.warn("Pas de tour défini", err);
                }
                const votedRound = localStorage.getItem("voted_round");
                hasVoted =
                    votedRound !== null && Number(votedRound) === currentRound;
            }

            function lockAllButtons(message) {
                allButtons.forEach((b) => (b.disabled = true));
                if (message) {
                    const info = document.getElementById("vote-info");
                    if (info) info.innerText = message;
                }
            }

            async function loadSongs() {
                try {
                    const { data, error } = await supabase
                        .from("songs")
                        .select("*")
                        .order("created_at", { ascending: true });
                    if (error) throw error;

                    const container = document.getElementById("songs");
                    container.innerHTML = "";

                    if (!data || data.length === 0) {
                        container.innerHTML =
                            '<div class="error">Aucun morceau disponible</div>';
                        return;
                    }

                    data.forEach((song) => {
                        const btn = document.createElement("button");
                        btn.innerText = `${song.title} - ${song.artist}`;
                        allButtons.push(btn);
                        btn.onclick = async () => {
                            if (hasVoted) {
                                alert("Tu as déjà voté ce tour ! Merci 🎸");
                                return;
                            }
                            try {
                                await supabase
                                    .from("votes")
                                    .insert([{ song_id: song.id }]);
                                hasVoted = true;
                                localStorage.setItem(
                                    "voted_round",
                                    String(currentRound),
                                );
                                lockAllButtons(
                                    "✅ Merci pour ton vote ! Attends le prochain tour 🎵",
                                );
                                btn.innerText = "✔ Ton choix 🎸";
                            } catch (err) {
                                console.error("Erreur vote:", err);
                                alert("Erreur lors du vote. Réessaye.");
                            }
                        };
                        container.appendChild(btn);
                    });

                    if (hasVoted)
                        lockAllButtons(
                            "✅ Déjà voté ce tour ! Attends le prochain 🎵",
                        );
                } catch (err) {
                    console.error("Erreur chargement:", err);
                    const container = document.getElementById("songs");
                    container.innerHTML =
                        '<div class="error">Erreur de connexion. Réessaye.</div>';
                }
            }

            (async () => {
                await loadRound();
                await loadSongs();
            })();

            supabase
                .channel("round-live")
                .on(
                    "postgres_changes",
                    { event: "UPDATE", schema: "public", table: "app_state" },
                    (payload) => {
                        const newRound = payload?.new?.round;
                        if (
                            typeof newRound === "number" &&
                            newRound !== currentRound
                        )
                            location.reload();
                    },
                )
                .subscribe();
        </script>
    </body>
</html>
