<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>QR Code - Table</title>
        <style>
            @page {
                size: A5;
                margin: 0;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
            }

            .card {
                width: 100%;
                max-width: 420px;
                text-align: center;
                border: 3px solid #111;
                border-radius: 24px;
                padding: 40px 30px;
                background: linear-gradient(135deg, #fafafa 0%, #fff 100%);
            }

            .emoji {
                font-size: 48px;
                margin-bottom: 10px;
            }

            h1 {
                font-size: 30px;
                color: #111;
                margin-bottom: 8px;
                line-height: 1.2;
            }

            .subtitle {
                font-size: 16px;
                color: #555;
                margin-bottom: 28px;
            }

            .qr-wrapper {
                background: #fff;
                padding: 16px;
                border-radius: 16px;
                display: inline-block;
                border: 2px solid #eee;
                margin-bottom: 24px;
            }

            .qr-wrapper img {
                width: 240px;
                height: 240px;
                display: block;
            }

            .steps {
                text-align: left;
                max-width: 280px;
                margin: 0 auto 20px;
            }

            .step {
                display: flex;
                align-items: center;
                gap: 12px;
                font-size: 15px;
                color: #333;
                margin-bottom: 10px;
            }

            .step .num {
                background: #111;
                color: #fff;
                width: 26px;
                height: 26px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 14px;
                flex-shrink: 0;
            }

            .footer {
                font-size: 13px;
                color: #999;
                margin-top: 10px;
            }

            .print-btn {
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                background: #111;
                color: #fff;
                border: none;
                border-radius: 10px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }

            @media print {
                .print-btn {
                    display: none;
                }
                body {
                    padding: 0;
                }
                .card {
                    border-color: #111;
                }
            }
        </style>
    </head>
    <body>
        <button class="print-btn" onclick="window.print()">🖨️ Imprimer</button>

        <div class="card">
            <div class="emoji">🎹</div>
            <h1>Vote pour le<br />prochain morceau !</h1>
            <p class="subtitle">C'est toi qui choisis la setlist 🎵</p>

            <div class="qr-wrapper">
                <img src="qr-vote.png" alt="QR Code de vote" />
            </div>

            <div class="steps">
                <div class="step">
                    <span class="num">1</span>
                    <span>Scanne le QR code avec ton téléphone</span>
                </div>
                <div class="step">
                    <span class="num">2</span>
                    <span>Choisis ton morceau préféré</span>
                </div>
                <div class="step">
                    <span class="num">3</span>
                    <span>Le plus voté est joué en live ! 🔥</span>
                </div>
            </div>

            <p class="footer">Aucune application requise · Gratuit</p>
        </div>
    </body>
</html>
