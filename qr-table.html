<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Jem Joy - Live à la carte</title>
        <style>
            @page {
                size: A5;
                margin: 0;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Georgia, "Times New Roman", serif;
                background: #fdfcf7;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
            }

            .card {
                width: 100%;
                max-width: 440px;
                text-align: center;
                background: #fdfcf7;
                padding: 48px 36px;
            }

            h1 {
                font-size: 52px;
                font-weight: 700;
                color: #1a1a1a;
                letter-spacing: 1px;
                margin-bottom: 18px;
            }

            .subtitle {
                font-size: 30px;
                font-style: italic;
                font-weight: 700;
                color: #c79a3c;
                margin-bottom: 40px;
            }

            .qr-wrapper {
                display: inline-block;
                margin-bottom: 40px;
            }

            .qr-wrapper img {
                width: 250px;
                height: 250px;
                display: block;
            }

            .steps {
                text-align: left;
                max-width: 300px;
                margin: 0 auto;
            }

            .step {
                font-size: 21px;
                font-weight: 700;
                color: #1a1a1a;
                margin-bottom: 18px;
                letter-spacing: 0.3px;
            }

            .step:last-child {
                margin-bottom: 0;
            }

            .print-btn {
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                background: #1a1a1a;
                color: #fff;
                border: none;
                border-radius: 10px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }

            @media print {
                .print-btn {
                    display: none;
                }
                body {
                    padding: 0;
                    background: #fff;
                }
                .card {
                    background: #fff;
                }
            }
        </style>
    </head>
    <body>
        <button class="print-btn" onclick="window.print()">🖨️ Imprimer</button>

        <div class="card">
            <h1>Jem Joy</h1>
            <p class="subtitle">Live à la carte !</p>

            <div class="qr-wrapper">
                <img src="qr-vote.png" alt="QR Code de vote" />
            </div>

            <div class="steps">
                <div class="step">1. Scannez le QR code</div>
                <div class="step">2. Parcourez la playlist</div>
                <div class="step">3. Choisissez votre chanson !</div>
            </div>
        </div>
    </body>
</html>
