<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard - Votes en direct</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
                min-height: 100vh;
                padding: 20px;
                color: #fff;
            }

            .container {
                max-width: 900px;
                margin: 0 auto;
            }

            .header {
                text-align: center;
                margin-bottom: 40px;
            }

            h1 {
                font-size: 36px;
                margin-bottom: 10px;
            }

            .timestamp {
                color: #9ca3af;
                font-size: 13px;
            }

            #stats {
                display: grid;
                gap: 15px;
            }

            .song-item {
                display: grid;
                grid-template-columns: 1fr auto;
                align-items: center;
                gap: 20px;
                background: rgba(255, 255, 255, 0.05);
                padding: 20px;
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all 0.3s ease;
            }

            .song-item:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .song-info h3 {
                font-size: 18px;
                margin-bottom: 5px;
                color: #fff;
            }

            .song-info p {
                color: #d1d5db;
                font-size: 14px;
            }

            .votes-section {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 10px;
            }

            .vote-count {
                font-size: 32px;
                font-weight: bold;
                color: #10b981;
            }

            .bar-container {
                width: 200px;
                height: 8px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 4px;
                overflow: hidden;
            }

            .bar-fill {
                height: 100%;
                background: linear-gradient(90deg, #10b981, #34d399);
                width: 0%;
                transition: width 0.4s ease;
                border-radius: 4px;
            }

            .top-1 {
                grid-column: 1 / -1;
                background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
                border-color: rgba(245, 158, 11, 0.3);
                padding: 30px;
                text-align: center;
                border-radius: 16px;
            }

            .top-1 h2 {
                font-size: 28px;
                margin-bottom: 10px;
            }

            .top-1 .crown {
                font-size: 48px;
                margin-bottom: 15px;
            }

            .top-1 .vote-count {
                font-size: 48px;
                color: #fef3c7;
            }

            .loading {
                text-align: center;
                color: #9ca3af;
                padding: 40px;
                font-size: 16px;
            }

            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
                margin-top: 30px;
                padding-top: 30px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }

            .stat-box {
                background: rgba(255, 255, 255, 0.05);
                padding: 15px;
                border-radius: 8px;
                text-align: center;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .stat-box .label {
                color: #9ca3af;
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .stat-box .value {
                font-size: 24px;
                font-weight: bold;
                color: #10b981;
                margin-top: 8px;
            }

            .refresh-indicator {
                display: inline-block;
                width: 10px;
                height: 10px;
                background: #10b981;
                border-radius: 50%;
                margin-right: 8px;
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>📊 Votes en direct</h1>
                <p class="timestamp">
                    <span class="refresh-indicator"></span>
                    Live depuis <span id="start-time">--:--</span>
                </p>
            </div>

            <div id="stats" class="loading">Chargement en cours...</div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="label">Total votes</div>
                    <div class="value" id="total-votes">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">Morceaux</div>
                    <div class="value" id="total-songs">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">Statut</div>
                    <div class="value" id="status">🟢 Live</div>
                </div>
            </div>
        </div>

        <script type="module">
            import { supabase } from "./supabase.js";

            let allSongs = [];
            let allVotes = [];

            // Afficher l'heure de démarrage
            document.getElementById("start-time").innerText =
                new Date().toLocaleTimeString("fr-FR", {
                    hour: "2-digit",
                    minute: "2-digit",
                });

            async function render() {
                try {
                    const { data: songs, error: songsError } = await supabase
                        .from("songs")
                        .select("*")
                        .order("created_at", { ascending: true });

                    const { data: votes, error: votesError } = await supabase
                        .from("votes")
                        .select("*");

                    if (songsError) throw songsError;
                    if (votesError) throw votesError;

                    allSongs = songs || [];
                    allVotes = votes || [];

                    const count = {};
                    allVotes.forEach((v) => {
                        count[v.song_id] = (count[v.song_id] || 0) + 1;
                    });

                    // Tri par votes (décroissant)
                    const sorted = [...allSongs].sort(
                        (a, b) => (count[b.id] || 0) - (count[a.id] || 0),
                    );

                    const maxVotes = Math.max(
                        ...sorted.map((s) => count[s.id] || 0),
                        1,
                    );

                    const container = document.getElementById("stats");
                    container.innerHTML = "";

                    // Top 1 (si votes > 0)
                    if (sorted[0] && count[sorted[0].id] > 0) {
                        const top1 = sorted[0];
                        const topDiv = document.createElement("div");
                        topDiv.className = "song-item top-1";
                        topDiv.innerHTML = `
            <div>
              <div class="crown">👑</div>
              <h2>${top1.title}</h2>
              <p>${top1.artist}</p>
              <div class="vote-count">${count[top1.id]} 🔥</div>
            </div>
          `;
                        container.appendChild(topDiv);
                    }

                    // Reste des morceaux
                    sorted.forEach((song, idx) => {
                        const voteCount = count[song.id] || 0;
                        const percentage =
                            maxVotes > 0 ? (voteCount / maxVotes) * 100 : 0;

                        const div = document.createElement("div");
                        div.className = "song-item";

                        div.innerHTML = `
            <div class="song-info">
              <h3>#${idx + 1} - ${song.title}</h3>
              <p>${song.artist}</p>
            </div>
            <div class="votes-section">
              <div class="vote-count">${voteCount}</div>
              <div class="bar-container">
                <div class="bar-fill" style="width: ${percentage}%"></div>
              </div>
            </div>
          `;

                        container.appendChild(div);
                    });

                    // Stats en bas
                    document.getElementById("total-votes").innerText =
                        allVotes.length;
                    document.getElementById("total-songs").innerText =
                        allSongs.length;
                    document.getElementById("status").innerText = "🟢 Live";
                } catch (err) {
                    console.error("Erreur render:", err);
                    document.getElementById("status").innerText = "🔴 Erreur";
                }
            }

            // Rendu initial
            render();

            // Écouter les changements en temps réel
            supabase
                .channel("votes-live")
                .on(
                    "postgres_changes",
                    {
                        event: "*",
                        schema: "public",
                        table: "votes",
                    },
                    () => {
                        render();
                    },
                )
                .subscribe();

            // Rerender toutes les 5 secondes (fallback)
            setInterval(render, 5000);
        </script>
    </body>
</html>
